server:
  port: 8082

spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/tickdata}
    username: ${DB_USER:tickuser}
    password: ${DB_PASSWORD:tickpass}
    hikari:
      maximum-pool-size: 5
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092,localhost:9093,localhost:9094}
    consumer:
      group-id: consumer-writer
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.ticksim.common.model"
        spring.json.value.default.type: ""
    listener:
      concurrency: 3
